name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Exact local interpreter is 3.14.3 (see python-version.txt). CI pins the
          # 3.14 minor line; a patch difference is a COMPATIBLE version, not the
          # exact freeze interpreter.
          python-version: '3.14'

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock.txt

      - name: Report environment
        run: |
          python --version
          python -c "import numpy, scipy, matplotlib; print('numpy', numpy.__version__, 'scipy', scipy.__version__, 'matplotlib', matplotlib.__version__)"

      - name: Run test suite
        run: |
          python -m pytest -q

      - name: Byte-compile all modules
        run: |
          python -m py_compile $(git ls-files '*.py')
